<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Order Gas · NaijaGaz</title>
  <meta name="theme-color" content="#0B3FE0">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
</head>
<body>

  <header class="topbar">
    <a href="index.html" class="back" aria-label="Back">←</a>
    <span class="step-label">Step <span id="step-num">1</span> of 4</span>
  </header>

  <main class="container">

    <!-- ── Step 1: cylinder size ─────────────────── -->
    <section class="step" data-step="1">
      <h2>Pick a cylinder size</h2>
      <div class="size-grid" id="size-grid"></div>
    </section>

    <!-- ── Step 2: address ─────────────────────────── -->
    <section class="step" data-step="2" hidden>
      <h2>Where to deliver?</h2>
      <label class="field">
        <span>District</span>
        <select id="f-district" required>
          <option value="">Choose…</option>
          <option value="lugbe">Lugbe</option>
          <option value="kubwa">Kubwa</option>
          <option value="nyanya">Nyanya</option>
        </select>
      </label>
      <label class="field">
        <span>Address</span>
        <textarea id="f-address" rows="3" placeholder="Estate / street / house number" required></textarea>
      </label>
      <label class="field">
        <span>Landmark <small class="muted">(optional)</small></span>
        <input id="f-landmark" type="text" placeholder="Near the mosque, by the school…" autocomplete="off">
      </label>
      <div class="actions">
        <button class="btn btn-secondary" data-back>Back</button>
        <button class="btn btn-primary" data-next>Continue</button>
      </div>
    </section>

    <!-- ── Step 3: phone + payment ─────────────────── -->
    <section class="step" data-step="3" hidden>
      <h2>How can we reach you?</h2>
      <label class="field" id="phone-field">
        <span>Phone number</span>
        <input id="f-phone" type="tel" inputmode="tel" placeholder="0801 234 5678" autocomplete="tel" required>
        <small class="muted">For SMS updates and rider's call</small>
      </label>
      <label class="field">
        <span>Your name <small class="muted">(optional)</small></span>
        <input id="f-name" type="text" autocomplete="given-name" placeholder="Aisha">
      </label>
      <fieldset class="field">
        <legend>Payment on delivery</legend>
        <label class="radio">
          <input type="radio" name="payment" value="cash" checked> <span>Cash</span>
        </label>
        <label class="radio">
          <input type="radio" name="payment" value="transfer"> <span>Bank transfer</span>
        </label>
        <label class="radio">
          <input type="radio" name="payment" value="pos"> <span>POS</span>
        </label>
      </fieldset>
      <div class="actions">
        <button class="btn btn-secondary" data-back>Back</button>
        <button class="btn btn-primary" data-next>Continue</button>
      </div>
    </section>

    <!-- ── Step 4: confirm ─────────────────────────── -->
    <section class="step" data-step="4" hidden>
      <h2>Confirm your order</h2>
      <div class="summary" id="summary"></div>
      <div class="actions">
        <button class="btn btn-secondary" data-back>Back</button>
        <button class="btn btn-primary" id="submit-btn">Place order</button>
      </div>
      <p id="submit-status" class="muted" style="margin-top:16px; text-align:center;"></p>
    </section>

  </main>

  <script type="module">
    import {
      ready, catalog, naira, phone, price, districtOk, paymentOk,
      saveDraft, loadDraft, clearDraft, rememberLast, submitOrder, isOnline
    } from './shell.js';

    await ready;

    // ── State ──
    const state = Object.assign({
      size: '', district: '', address: '', landmark: '',
      phone: '', name: '', payment: 'cash', step: 1,
    }, loadDraft());

    // ── Render cylinder size cards ──
    const grid = document.getElementById('size-grid');
    catalog().forEach(({ size, price: p, days }) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'size-card' + (state.size === size ? ' selected' : '');
      btn.dataset.size = size;
      btn.innerHTML = `
        <div class="size">${size}<small>kg</small></div>
        <div class="price">${naira(p)}</div>
        <div class="days">~${days} days</div>
      `;
      btn.addEventListener('click', () => {
        state.size = size;
        document.querySelectorAll('.size-card').forEach(c => c.classList.toggle('selected', c.dataset.size === size));
        saveDraft(state);
        setTimeout(() => goto(2), 180);
      });
      grid.appendChild(btn);
    });

    // ── Step navigation ──
    function goto(n) {
      state.step = n;
      saveDraft(state);
      document.querySelectorAll('.step').forEach(s => s.hidden = Number(s.dataset.step) !== n);
      document.getElementById('step-num').textContent = String(n);
      window.scrollTo({ top: 0, behavior: 'smooth' });
      if (n === 4) renderSummary();
    }

    document.querySelectorAll('[data-back]').forEach(b =>
      b.addEventListener('click', () => goto(state.step - 1))
    );
    document.querySelectorAll('[data-next]').forEach(b =>
      b.addEventListener('click', () => {
        if (state.step === 2 && !validateStep2()) return;
        if (state.step === 3 && !validateStep3()) return;
        goto(state.step + 1);
      })
    );

    // ── Field bindings ──
    const $ = (id) => document.getElementById(id);
    $('f-district').value = state.district;
    $('f-address').value = state.address;
    $('f-landmark').value = state.landmark;
    $('f-phone').value = state.phone;
    $('f-name').value = state.name;
    document.querySelector(`input[name="payment"][value="${state.payment}"]`).checked = true;

    $('f-district').addEventListener('change', e => { state.district = e.target.value; saveDraft(state); });
    $('f-address').addEventListener('input', e => { state.address = e.target.value; saveDraft(state); });
    $('f-landmark').addEventListener('input', e => { state.landmark = e.target.value; saveDraft(state); });
    $('f-phone').addEventListener('input', e => { state.phone = e.target.value; saveDraft(state); });
    $('f-name').addEventListener('input', e => { state.name = e.target.value; saveDraft(state); });
    document.querySelectorAll('input[name="payment"]').forEach(r =>
      r.addEventListener('change', e => { state.payment = e.target.value; saveDraft(state); })
    );

    // ── Validation (Wasm-backed) ──
    function validateStep2() {
      if (!districtOk(state.district)) {
        flashError('f-district', 'Choose your district');
        return false;
      }
      if (!state.address || state.address.trim().length < 5) {
        flashError('f-address', 'A clear address helps the rider find you');
        return false;
      }
      return true;
    }

    function validateStep3() {
      const normalized = phone(state.phone);
      if (!normalized) {
        flashError('f-phone', 'Enter a valid Nigerian phone, e.g. 0801 234 5678');
        return false;
      }
      state.phone = normalized; // overwrite with E.164
      $('f-phone').value = normalized;
      saveDraft(state);
      if (!paymentOk(state.payment)) {
        flashError(null, 'Pick a payment method');
        return false;
      }
      return true;
    }

    function flashError(fieldId, msg) {
      if (fieldId) {
        const f = document.getElementById(fieldId).closest('.field');
        f.classList.add('error');
        setTimeout(() => f.classList.remove('error'), 1500);
      }
      const s = document.getElementById('submit-status');
      s.textContent = msg;
      s.style.color = 'var(--warn)';
      setTimeout(() => { if (s.textContent === msg) s.textContent = ''; }, 3000);
    }

    // ── Confirm summary ──
    const districtLabel = { lugbe: 'Lugbe', kubwa: 'Kubwa', nyanya: 'Nyanya' };
    const paymentLabel = { cash: 'Cash', transfer: 'Bank transfer', pos: 'POS' };

    function renderSummary() {
      const total = price(state.size);
      $('summary').innerHTML = `
        <div class="summary-row"><span class="label">Cylinder</span><span class="value">${state.size}kg refill</span></div>
        <div class="summary-row"><span class="label">District</span><span class="value">${districtLabel[state.district] || ''}</span></div>
        <div class="summary-row"><span class="label">Address</span><span class="value">${escapeHtml(state.address)}${state.landmark ? '<br><small class="muted">' + escapeHtml(state.landmark) + '</small>' : ''}</span></div>
        <div class="summary-row"><span class="label">Phone</span><span class="value">${state.phone}</span></div>
        ${state.name ? `<div class="summary-row"><span class="label">Name</span><span class="value">${escapeHtml(state.name)}</span></div>` : ''}
        <div class="summary-row"><span class="label">Payment</span><span class="value">${paymentLabel[state.payment]} on delivery</span></div>
        <div class="summary-total"><span>Total</span><span>${naira(total)}</span></div>
      `;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // ── Submit ──
    $('submit-btn').addEventListener('click', async () => {
      const btn = $('submit-btn');
      const status = $('submit-status');
      btn.disabled = true;
      status.style.color = 'var(--muted)';
      status.innerHTML = '<span class="spinner"></span> Sending order…';

      const payload = {
        size: state.size,
        district: state.district,
        address: state.address,
        landmark: state.landmark,
        phone: state.phone,
        name: state.name,
        payment: state.payment,
      };

      try {
        if (!isOnline()) throw new Error('OFFLINE');
        const r = await submitOrder(payload);
        if (!r.ok) throw new Error(r.error || 'UNKNOWN');
        rememberLast({ order_id: r.order_id, size: state.size });
        clearDraft();
        location.href = 'track.html?id=' + encodeURIComponent(r.order_id) + '&fresh=1';
      } catch (err) {
        btn.disabled = false;
        status.style.color = 'var(--warn)';
        if (err.message === 'OFFLINE') {
          status.textContent = 'You are offline. Order saved — try again when you have signal.';
        } else if (err.message === 'BROKER_NOT_CONFIGURED') {
          status.textContent = 'Order broker not configured yet (dev mode).';
        } else {
          status.textContent = 'Could not send. Tap to try again.';
        }
      }
    });

    // ── Boot to last step ──
    if (state.size && state.step > 1) goto(state.step);
  </script>

</body>
</html>
