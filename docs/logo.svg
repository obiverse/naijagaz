<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" fill="none" role="img" aria-label="NaijaGaz">
  <title>NaijaGaz</title>

  <!-- ─────────────────────────────────────────────────
       Nine orbital dots at radius 110 around the mark.
       Nine = Naija. Nine = the cylinder's valve threading.
       Nine = Adinkrahene's radiance. Nine = the cosmos.
       ───────────────────────────────────────────────── -->
  <g fill="#0B3FE0">
    <circle cx="160"    cy="30"     r="4"/>
    <circle cx="230.71" cy="55.73"  r="4"/>
    <circle cx="268.32" cy="120.90" r="4"/>
    <circle cx="255.26" cy="195"    r="4"/>
    <circle cx="197.62" cy="243.37" r="4"/>
    <circle cx="122.38" cy="243.37" r="4"/>
    <circle cx="64.74"  cy="195"    r="4"/>
    <circle cx="51.68"  cy="120.90" r="4"/>
    <circle cx="89.29"  cy="55.73"  r="4"/>
  </g>

  <!-- ─────────────────────────────────────────────────
       The mark: the cylinder, the vesica flame, the ember.
       ───────────────────────────────────────────────── -->
  <g transform="translate(40, 20)">
    <path fill-rule="evenodd" fill="#0B3FE0" d="
      M 120 28 a 92 92 0 1 0 0 184 a 92 92 0 1 0 0 -184 Z
      M 120 60 A 75 75 0 0 1 120 180 A 75 75 0 0 1 120 60 Z
    "/>
    <circle cx="120" cy="120" r="5" fill="#F97316"/>
  </g>

  <!-- ─────────────────────────────────────────────────
       Wordmark in Ubuntu — the African philosophy as a typeface.
       Lowercase, joined, slightly tightened. The contemporary
       Naija consumer-brand cadence (paystack, kuda, piggyvest).
       ───────────────────────────────────────────────── -->
  <text x="160" y="320" text-anchor="middle"
        font-family="'Ubuntu', system-ui, sans-serif"
        font-weight="700" font-size="44"
        letter-spacing="-1"
        fill="#0B3FE0">naijagaz</text>
</svg>
