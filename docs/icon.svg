<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" role="img" aria-label="NaijaGaz">
  <title>NaijaGaz</title>

  <!-- The cylinder seen from above (cobalt disk) with the vesica piscis flame
       cut as negative space. Two overlapping circles (R=75, centers 90 apart)
       form a lens 60 wide × 120 tall — classic 2:1 flame proportion. The flame
       is the void; the gas reveals itself by what the cylinder releases. -->
  <path fill-rule="evenodd" fill="#0B3FE0" d="
    M 120 28 a 92 92 0 1 0 0 184 a 92 92 0 1 0 0 -184 Z
    M 120 60 A 75 75 0 0 1 120 180 A 75 75 0 0 1 120 60 Z
  "/>

  <!-- The ember at the heart of the flame — the moment of ignition. -->
  <circle cx="120" cy="120" r="5" fill="#F97316"/>
</svg>
