<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Track Order · NaijaGaz</title>
  <meta name="theme-color" content="#0B3FE0">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Ubuntu:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
</head>
<body>

  <header class="topbar">
    <a href="index.html" class="back" aria-label="Back">←</a>
    <span class="step-label">Tracking</span>
  </header>

  <main class="container">

    <div class="status-card">
      <div class="status-banner" id="banner">Order received 🔥</div>
      <div class="status-id" id="order-id">—</div>

      <ol class="timeline" id="timeline">
        <li data-status="NEW">Received</li>
        <li data-status="CONFIRMED">Confirmed</li>
        <li data-status="PREPARING">Preparing</li>
        <li data-status="OUT_FOR_DELIVERY">On the way</li>
        <li data-status="COMPLETED">Delivered</li>
      </ol>

      <div id="rider-info" class="rider-info" hidden>
        <p>Your rider <strong id="rider-name">—</strong> is on the way</p>
        <a id="rider-phone-btn" class="btn btn-ember" href="#">Call rider</a>
      </div>

      <p id="status-text" class="status-text">Loading…</p>
    </div>

    <div style="text-align:center;">
      <a href="index.html" class="btn-link">← Back to home</a>
    </div>
  </main>

  <script type="module">
    import { ready, fetchOrder } from './shell.js';

    await ready;

    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const fresh = params.has('fresh');
    const banner = document.getElementById('banner');
    const idEl = document.getElementById('order-id');
    const statusText = document.getElementById('status-text');
    const riderInfo = document.getElementById('rider-info');

    if (!id) {
      idEl.textContent = '—';
      banner.textContent = 'No order ID';
      statusText.textContent = 'Open this page from a tracking link.';
    } else {
      idEl.textContent = id;
      if (fresh) banner.textContent = 'Order placed 🎉';
      refresh();
      setInterval(refresh, 30000);
    }

    async function refresh() {
      try {
        const r = await fetchOrder(id);
        if (!r.ok) {
          statusText.textContent = r.error === 'NOT_FOUND' ? 'Order not found.' : 'Could not load.';
          return;
        }
        const sequence = ['NEW', 'CONFIRMED', 'PREPARING', 'OUT_FOR_DELIVERY', 'COMPLETED'];
        const idx = sequence.indexOf(r.status);
        document.querySelectorAll('#timeline li').forEach((li, i) => {
          li.classList.toggle('done', i <= idx);
          li.classList.toggle('current', i === idx);
        });

        if (r.status === 'OUT_FOR_DELIVERY' && r.rider_phone) {
          riderInfo.hidden = false;
          document.getElementById('rider-name').textContent = r.rider_name || 'rider';
          const a = document.getElementById('rider-phone-btn');
          a.href = 'tel:' + r.rider_phone;
          a.textContent = 'Call ' + (r.rider_name || 'rider');
        } else {
          riderInfo.hidden = true;
        }

        const messages = {
          NEW: 'Order received. We will confirm shortly.',
          CONFIRMED: 'Confirmed. Vendor is being notified.',
          PREPARING: 'Your gas is being prepared at our partner plant.',
          OUT_FOR_DELIVERY: 'On the way. ETA ~30 mins.',
          COMPLETED: 'Delivered. Thank you for using NaijaGaz!',
          CANCELLED: 'This order was cancelled.',
        };
        statusText.textContent = messages[r.status] || 'Working on it…';

        // Banner reflects current state
        const banners = {
          NEW: 'Order received 🔥',
          CONFIRMED: 'Confirmed ✓',
          PREPARING: 'Being prepared 🔥',
          OUT_FOR_DELIVERY: 'On the way 🏍️',
          COMPLETED: 'Delivered ✨',
        };
        if (!fresh || r.status !== 'NEW') {
          banner.textContent = banners[r.status] || 'Order';
        }
      } catch (err) {
        if (err.message === 'BROKER_NOT_CONFIGURED') {
          statusText.textContent = 'Tracking broker not configured yet (dev mode).';
        } else {
          statusText.textContent = 'Could not check status. Retrying…';
        }
      }
    }
  </script>

</body>
</html>
