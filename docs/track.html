<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Track Order · NaijaGaz</title>
  <meta name="theme-color" content="#0B3FE0">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Ubuntu:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
</head>
<body>

  <!-- ── Cinematic success overlay (fresh=1) ────────── -->
  <div class="success-overlay" id="success-overlay" hidden aria-hidden="true">
    <div class="success-content">
      <div class="success-mark" aria-hidden="true">
        <svg class="success-orbit" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
          <g>
            <circle cx="140"   cy="14"     r="4.5"/>
            <circle cx="221"   cy="43.5"   r="4.5"/>
            <circle cx="264.1" cy="118.1"  r="4.5"/>
            <circle cx="249.1" cy="203"    r="4.5"/>
            <circle cx="183.1" cy="258.4"  r="4.5"/>
            <circle cx="96.9"  cy="258.4"  r="4.5"/>
            <circle cx="30.9"  cy="203"    r="4.5"/>
            <circle cx="15.9"  cy="118.1"  r="4.5"/>
            <circle cx="59"    cy="43.5"   r="4.5"/>
          </g>
        </svg>
        <img src="icon.svg" class="success-flame" alt="">
      </div>
      <h2 class="success-title">Order placed</h2>
      <p class="success-id" id="success-id">—</p>
      <p class="success-sub">Your gas is on the way 🔥</p>
    </div>
  </div>

  <header class="topbar">
    <a href="index.html" class="back" aria-label="Back">←</a>
    <span class="step-label">Tracking</span>
  </header>

  <main class="container">

    <div class="status-card">
      <div class="status-icon" id="status-icon">
        <span id="status-emoji">📦</span>
      </div>
      <div class="status-banner" id="banner">Order received</div>
      <div class="status-id" id="order-id">—</div>

      <ol class="timeline" id="timeline">
        <li data-status="NEW">Received</li>
        <li data-status="CONFIRMED">Confirmed</li>
        <li data-status="PREPARING">Preparing</li>
        <li data-status="OUT_FOR_DELIVERY">On the way</li>
        <li data-status="COMPLETED">Delivered</li>
      </ol>

      <div id="rider-info" class="rider-info" hidden>
        <p>Your rider <strong id="rider-name">—</strong> is on the way</p>
        <a id="rider-phone-btn" class="btn btn-ember" href="#">Call rider</a>
      </div>

      <p id="status-text" class="status-text">Loading…</p>

      <!-- Local actions for WhatsApp-mode orders -->
      <div id="local-actions" hidden style="display: grid; gap: 10px; margin-top: 18px;">
        <button id="mark-delivered" class="btn btn-secondary" type="button">Mark as delivered ✓</button>
        <button id="share-track" class="btn btn-ghost" type="button" hidden>Share tracking link ↗</button>
      </div>
    </div>

    <div style="text-align:center; margin-top: 14px;">
      <a href="orders.html" class="btn-link">📋 All your orders</a>
      <span style="color: var(--ink-400); margin: 0 8px;">·</span>
      <a href="index.html" class="btn-link">Home</a>
    </div>
  </main>

  <script type="module">
    import {
      ready, fetchOrder, haptic, findInHistory, updateInHistory,
      naira, relativeTime, track, canShare, shareOrder
    } from './shell.js';

    await ready;
    track('track_page_open');

    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const fresh = params.has('fresh');

    // Look up the local history entry first — works even when no broker.
    const localOrder = id ? findInHistory(id) : null;

    const banner = document.getElementById('banner');
    const idEl = document.getElementById('order-id');
    const statusText = document.getElementById('status-text');
    const riderInfo = document.getElementById('rider-info');
    const iconBox = document.getElementById('status-icon');
    const emojiEl = document.getElementById('status-emoji');

    // ── Cinematic success: fade out after 3.2s, then the timeline takes over ──
    if (fresh && id) {
      const overlay = document.getElementById('success-overlay');
      document.getElementById('success-id').textContent = id;
      overlay.hidden = false;
      haptic([30, 60, 30]);
      setTimeout(() => { overlay.style.display = 'none'; }, 3200);
    }

    if (!id) {
      idEl.textContent = '—';
      banner.textContent = 'No order ID';
      statusText.textContent = 'Open this page from a tracking link.';
    } else {
      idEl.textContent = id;
      // For WhatsApp-mode orders we have no remote endpoint — render
      // from local history. For broker-mode orders we render local
      // first (instant), then fetch live + reconcile.
      if (localOrder) renderFromLocal();
      if (localOrder?.mode !== 'whatsapp') {
        refresh();
        setInterval(refresh, 30000);
      }
    }

    function renderFromLocal() {
      if (!localOrder) return;
      const status = localOrder.status || 'sent';
      const sequence = ['NEW', 'CONFIRMED', 'PREPARING', 'OUT_FOR_DELIVERY', 'COMPLETED'];

      let idx;
      if (status === 'sent') idx = 0;
      else if (status === 'delivered') idx = sequence.length - 1;
      else idx = sequence.indexOf(status);

      document.querySelectorAll('#timeline li').forEach((li, i) => {
        li.classList.toggle('done', i <= idx);
        li.classList.toggle('current', i === idx);
      });

      iconBox.className = 'status-icon';
      if (status === 'delivered' || status === 'COMPLETED') {
        emojiEl.textContent = '✨';
        iconBox.classList.add('is-completed');
      } else {
        emojiEl.textContent = '📦';
      }

      banner.textContent = localOrder.size ? `${localOrder.size}kg · ${naira(localOrder.price)}` : 'Order';
      statusText.textContent =
        status === 'delivered' ? 'Delivered. Thank you!' :
        localOrder.mode === 'whatsapp'
          ? `Sent on WhatsApp ${relativeTime(localOrder.timestamp)}. The operator will confirm.`
          : `Order placed ${relativeTime(localOrder.timestamp)}.`;

      // Surface the local-action buttons for WhatsApp-mode orders only.
      // (Broker mode gets its truth from doGet → server-controlled status.)
      const actions = document.getElementById('local-actions');
      if (localOrder.mode === 'whatsapp' && actions) {
        actions.hidden = false;
        const md = document.getElementById('mark-delivered');
        if (status === 'delivered') {
          md.textContent = 'Delivered ✓';
          md.disabled = true;
        }
        md.addEventListener('click', () => {
          if (md.disabled) return;
          updateInHistory(id, { status: 'delivered', delivered_at: Date.now() });
          track('mark_delivered', { order_id: id });
          haptic([20, 40, 20]);
          renderFromLocal();
        }, { once: true });

        const sb = document.getElementById('share-track');
        if (canShare()) {
          sb.hidden = false;
          sb.addEventListener('click', () => {
            haptic(10);
            shareOrder(`Track my NaijaGaz order — ${localOrder.size}kg almost on the way`, location.href);
          });
        }
      }
    }

    const ICONS = {
      NEW: '📦',
      CONFIRMED: '✓',
      PREPARING: '🔥',
      OUT_FOR_DELIVERY: '🏍️',
      COMPLETED: '✨',
      CANCELLED: '✕',
    };
    const BANNERS = {
      NEW: 'Order received',
      CONFIRMED: 'Confirmed ✓',
      PREPARING: 'Being prepared 🔥',
      OUT_FOR_DELIVERY: 'On the way 🏍️',
      COMPLETED: 'Delivered ✨',
      CANCELLED: 'Cancelled',
    };
    const MESSAGES = {
      NEW: 'Order received. We will confirm shortly.',
      CONFIRMED: 'Confirmed. Vendor is being notified.',
      PREPARING: 'Your gas is being prepared at our partner plant.',
      OUT_FOR_DELIVERY: 'On the way. ETA ~30 mins.',
      COMPLETED: 'Delivered. Thank you for using NaijaGaz!',
      CANCELLED: 'This order was cancelled.',
    };

    async function refresh() {
      try {
        const r = await fetchOrder(id);
        if (!r.ok) {
          statusText.textContent = r.error === 'NOT_FOUND' ? 'Order not found.' : 'Could not load.';
          return;
        }
        const sequence = ['NEW', 'CONFIRMED', 'PREPARING', 'OUT_FOR_DELIVERY', 'COMPLETED'];
        const idx = sequence.indexOf(r.status);
        document.querySelectorAll('#timeline li').forEach((li, i) => {
          li.classList.toggle('done', i <= idx);
          li.classList.toggle('current', i === idx);
        });

        // Status icon swap
        emojiEl.textContent = ICONS[r.status] || '📦';
        iconBox.className = 'status-icon';
        if (r.status === 'PREPARING') iconBox.classList.add('is-preparing');
        else if (r.status === 'OUT_FOR_DELIVERY') iconBox.classList.add('is-out');
        else if (r.status === 'COMPLETED') iconBox.classList.add('is-completed');

        // Rider info card during delivery
        if (r.status === 'OUT_FOR_DELIVERY' && r.rider_phone) {
          riderInfo.hidden = false;
          document.getElementById('rider-name').textContent = r.rider_name || 'rider';
          const a = document.getElementById('rider-phone-btn');
          a.href = 'tel:' + r.rider_phone;
          a.textContent = 'Call ' + (r.rider_name || 'rider');
        } else {
          riderInfo.hidden = true;
        }

        statusText.textContent = MESSAGES[r.status] || 'Working on it…';
        if (!(fresh && r.status === 'NEW')) {
          banner.textContent = BANNERS[r.status] || 'Order';
        }
      } catch (err) {
        if (err.message === 'BROKER_NOT_CONFIGURED') {
          statusText.textContent = 'Tracking broker not configured yet (dev mode).';
        } else {
          statusText.textContent = 'Could not check status. Retrying…';
        }
      }
    }
  </script>

</body>
</html>
