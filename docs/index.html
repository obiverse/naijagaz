<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>NaijaGaz — Cooking gas in 90 minutes</title>
  <meta name="description" content="Order cooking gas. Pay on delivery. Lugbe · Kubwa · Nyanya.">
  <meta name="theme-color" content="#0B3FE0">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
</head>
<body>

  <main class="hero">
    <img src="logo.svg" alt="NaijaGaz" class="hero-logo" width="240" height="360">
    <h1>Cooking gas in 90 minutes.</h1>
    <p class="lede">Tap, confirm, pay on delivery. No queues. No guessing prices.</p>

    <a href="order.html" class="btn btn-primary">Order gas</a>
    <a href="again.html" class="btn-link" id="reorder-link" hidden>Reorder your last cylinder →</a>
    <a href="#" class="btn-link" id="track-link">Track an order</a>
  </main>

  <footer class="footer">
    <p><strong>Lugbe · Kubwa · Nyanya</strong></p>
    <p class="muted">WhatsApp +234 801 NAIJA GAZ</p>
  </footer>

  <div class="install-banner" id="install-banner" hidden>
    <p>Install NaijaGaz for faster reorders</p>
    <button id="install-btn">Install</button>
    <button class="dismiss" id="install-dismiss" aria-label="Dismiss">×</button>
  </div>

  <script type="module">
    import { ready, recallLast, isInstallable, promptInstall } from './shell.js';

    await ready;

    // Reorder link if there's a remembered last order
    const last = recallLast();
    if (last && last.order_id) {
      document.getElementById('reorder-link').hidden = false;
    }

    // Track-an-order prompt
    document.getElementById('track-link').addEventListener('click', (e) => {
      e.preventDefault();
      const id = prompt('Order ID (e.g. NG-20260426-0001):');
      if (id) location.href = 'track.html?id=' + encodeURIComponent(id.trim());
    });

    // Install banner
    const banner = document.getElementById('install-banner');
    document.addEventListener('naijagaz:installable', () => { banner.hidden = false; });
    document.getElementById('install-btn').addEventListener('click', async () => {
      await promptInstall();
      banner.hidden = true;
    });
    document.getElementById('install-dismiss').addEventListener('click', () => {
      banner.hidden = true;
      sessionStorage.setItem('install_dismissed', '1');
    });
    if (sessionStorage.getItem('install_dismissed')) banner.hidden = true;
  </script>

</body>
</html>
